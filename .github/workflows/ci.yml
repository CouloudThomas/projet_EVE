name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate structured configs
        run: |
          python -c "import json, pathlib; [json.loads(path.read_text(encoding='utf-8')) for path in pathlib.Path('config').glob('*.yaml')]"

      - name: Compile source
        run: python -m compileall -q src

      - name: Run tests
        run: python -m pytest -q

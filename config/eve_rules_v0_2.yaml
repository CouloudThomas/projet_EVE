        "normal": 0.15,
        "dry": 0.60,
        "very_dry": 0.85
      },
      "vpd_bonus": {
        "normal": 0.0,
        "high": 0.15,
        "very_high": 0.25,
        "unknown": 0.0
      }
    },
    "quality_risk": {
      "satellite_quality_scores": {
        "good": 0.0,
        "usable": 0.35,
        "poor": 1.0,
        "unknown": 0.8
      }
    },
    "consistency_method": "min"
